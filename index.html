<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>환율 변환기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="converter-card">
    <h1 class="title">환율 변환기</h1>

    <label class="field-label" for="amount-input">금액</label>
    <input
      type="number"
      id="amount-input"
      class="amount-input"
      placeholder="금액을 입력하

    <div class="currency-row">
      <div class="currency-field">
        <label class="field-label" for="from-currency">From</label>
        <select id="from-currency" class="currency-select">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="KRW">KRW</option>
          <option value="JPY">JPY</option>
          <option value="SGD">SGD</option>
          <option value="CNY">CNY</option>
        </select>
      </div>

      <button id="swap-btn" class="swap-btn" type="button">🔄 통화 교환</button>

      <div class="currency-field">
        <label class="field-label" for="to-currency">To</label>
        <select id="to-currency" class="currency-select">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="KRW">KRW</option>
          <option value="JPY">JPY</option>
          <option value="SGD">SGD</option>
          <option value="CNY">CNY</option>
        </select>
      </div>
    </div>

    <button id="convert-btn" class="convert-btn">통화 변환</button>

    <div id="result" class="result-area"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
